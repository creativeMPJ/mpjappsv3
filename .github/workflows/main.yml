name: Deploy to Dewaweb
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Build Frontend
      - name: Build Frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # 2. Upload ke Dewaweb
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.ingintau.my.id
          username: mpj@mpj.ingintau.my.id
          password: TUsmekisa1968
          # Upload isi folder dist ke public_html
          local-dir: ./dist/
          server-dir: ./
